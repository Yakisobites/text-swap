version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck     # エラー無視のチェック
    - govet        # Go標準の静的解析
    - ineffassign  # 無駄な代入のチェック
    - staticcheck  # 高度な静的解析（バグの元を検知）
    - unused       # 未使用コードのチェック

formatters:
  enable:
    - goimports
    - gofumpt        # コードフォーマットのチェック

issues:
  exclude-use-default: false